# UITGESCHAKELD — one.com blokkeert GitHub Actions datacenter IPs via IMAP.
# Deze scan draait via cronjob op de restaurant Mac (12:00 CEST).
# Zie SPEC.md: "IMAP scans draaien op de Mac, niet via GitHub Actions."
name: Lightspeed dagrapport scan

on:
  workflow_dispatch:  # alleen handmatig, geen automatische schedule

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Maak settings.json
        run: |
          cat > settings.json << 'EOF'
          {
            "imapHost": "${{ secrets.IMAP_HOST }}",
            "imapPort": "${{ secrets.IMAP_PORT }}",
            "imapUser": "${{ secrets.IMAP_USER }}",
            "imapPass": "${{ secrets.IMAP_PASS }}",
            "imapUser2": "${{ secrets.IMAP_USER2 }}",
            "imapPass2": "${{ secrets.IMAP_PASS2 }}",
            "imapHost2": "${{ secrets.IMAP_HOST2 }}",
            "notionToken": "${{ secrets.NOTION_TOKEN }}",
            "notionDbId": "${{ secrets.NOTION_DB_ID }}",
            "anthropicKey": "${{ secrets.ANTHROPIC_KEY }}",
            "alertThreshold": ${{ secrets.ALERT_THRESHOLD }},
            "supabaseUrl": "${{ secrets.SUPABASE_URL }}",
            "supabaseKey": "${{ secrets.SUPABASE_KEY }}",
            "tebiToken": ""
          }
          EOF

      - name: Dagrapport scannen
        run: node scan.js
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          IMAP_USER2: ${{ secrets.IMAP_USER2 }}
          IMAP_PASS2: ${{ secrets.IMAP_PASS2 }}
          IMAP_HOST2: ${{ secrets.IMAP_HOST2 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
