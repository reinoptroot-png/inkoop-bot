name: Lightspeed (PosiOS) dagrapport scan

on:
  schedule:
    - cron: '35 5 * * *'  # 07:35 CEST (UTC+2) — na de Tebi-scan
  workflow_dispatch:
    inputs:
      datum:
        description: 'Datum (YYYY-MM-DD), leeg = gisteren'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NB: automatische token-refresh via headless login is NIET mogelijk —
      # Lightspeed ID is beschermd met Cloudflare Turnstile (anti-bot CAPTCHA).
      # De scan gebruikt daarom de handmatig ingestelde LS_POS_TOKEN secret.
      # Verloopt de token, ververs LS_POS_TOKEN (zie lightspeed-posios-login.js
      # voor een headed refresh op de eigen Mac).
      - name: Dagrapport scannen (PosiOS)
        run: node lightspeed-posios-scan.js ${{ inputs.datum }}
        env:
          LS_POS_TOKEN: ${{ secrets.LS_POS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
