name: Lightspeed (PosiOS) dagrapport scan

on:
  schedule:
    - cron: '35 5 * * *'  # 07:35 CEST (UTC+2) — na de Tebi-scan
  workflow_dispatch:
    inputs:
      datum:
        description: 'Datum (YYYY-MM-DD), leeg = gisteren'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Verse sessie-token ophalen (Lightspeed ID login)
        run: node lightspeed-posios-login.js
        env:
          LS_POS_USER: ${{ secrets.LS_POS_USER }}
          LS_POS_PASS: ${{ secrets.LS_POS_PASS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Dagrapport scannen (PosiOS)
        # Geen LS_POS_TOKEN env → de scan leest de zojuist vernieuwde token uit
        # Supabase instellingen (ls_pos_token).
        run: node lightspeed-posios-scan.js ${{ inputs.datum }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
