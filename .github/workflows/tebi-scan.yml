name: Tebi dagrapport scan

on:
  schedule:
    - cron: '25 5 * * *'  # 07:25 CEST (UTC+2)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Maak settings.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
        run: |
          node -e "
            const s = {
              supabaseUrl: process.env.SUPABASE_URL || '',
              supabaseKey: process.env.SUPABASE_KEY || '',
              notionToken: process.env.NOTION_TOKEN || '',
              notionDbId: process.env.NOTION_DB_ID || '',
              anthropicKey: process.env.ANTHROPIC_KEY || '',
              alertThreshold: Number(process.env.ALERT_THRESHOLD) || 10,
              imapHost: process.env.IMAP_HOST || '',
              imapPort: Number(process.env.IMAP_PORT) || 993,
              imapUser: process.env.IMAP_USER || '',
              imapPass: process.env.IMAP_PASS || '',
              tebiToken: ''
            };
            require('fs').writeFileSync('settings.json', JSON.stringify(s));
          "

      - name: Token ophalen
        run: node tebi-token-refresh.js

      - name: Dagrapport scannen
        run: node tebi-scan.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
