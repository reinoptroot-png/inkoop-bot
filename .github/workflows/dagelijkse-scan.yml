name: Dagelijkse inkoop scan

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 Amsterdam tijd (UTC+2 zomer / UTC+1 winter)
  workflow_dispatch:        # handmatig starten via GitHub UI

jobs:
  scan:
    name: Scan facturen → Notion
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installeer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installeer dependencies
        run: npm ci --omit=dev

      - name: Voer inkoop scan uit
        env:
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAP_USER:         ${{ secrets.IMAP_USER }}
          IMAP_PASS:         ${{ secrets.IMAP_PASS }}
          IMAP_USER2:        ${{ secrets.IMAP_USER2 }}
          IMAP_PASS2:        ${{ secrets.IMAP_PASS2 }}
        run: node scan.js
